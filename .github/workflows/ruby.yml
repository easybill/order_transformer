name: Ruby

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-slim

    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true

    - name: Run license finder
      run: bundle exec license_finder

    - name: Run standard
      run: bundle exec standardrb

    - name: Run tests
      run: bundle exec rake
